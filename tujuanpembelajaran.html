<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Tujuan Pembelajaran</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:#333;
}

header{
  padding:25px;
  text-align:center;
  color:white;
  font-size:22px;
  font-weight:600;
}

.container{
  max-width:850px;
  margin:40px auto;
  padding:20px;
}

.card{
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover{
  transform: translateY(-5px);
}

h2{
  color:#4a4a4a;
}

ul{
  line-height:1.9;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:10px 18px;
  background:#667eea;
  color:white;
  text-decoration:none;
  border-radius:10px;
  transition:0.3s;
}

.btn:hover{
  background:#5a67d8;
}
</style>
</head>

<body>

<header>📘 Tujuan Pembelajaran</header>

<div class="container">
  <div class="card">
    <h2>Setelah pembelajaran ini, siswa mampu:</h2>
    <ul>
      <li>Memahami konsep berpikir komputasional</li>
      <li>Mengenali algoritma dalam kehidupan sehari-hari</li>
      <li>Menyusun langkah pemecahan masalah</li>
      <li>Menerapkan logika dasar pemrograman</li>
    </ul>

    <a class="btn" href="apersepsi.html">Lanjut ➜ Apersepsi</a>
  </div>
</div>

</body>
</html>
